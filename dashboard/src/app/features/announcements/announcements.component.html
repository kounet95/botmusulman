<div class="page-container">
  <div class="page-header">
    <h2>📢 Annonces</h2>
    <button mat-flat-button color="primary" (click)="openCreate()">
      <mat-icon>add</mat-icon>
      Nouvelle annonce
    </button>
  </div>

  <mat-card>
    @if (!loading() && announcements().length === 0) {
      <div class="empty-state">Aucune annonce</div>
    } @else {
      <table mat-table [dataSource]="announcements()" class="full-width-table">
        <ng-container matColumnDef="title">
          <th mat-header-cell *matHeaderCellDef>Titre</th>
          <td mat-cell *matCellDef="let a"><strong>{{ a.title }}</strong></td>
        </ng-container>

        <ng-container matColumnDef="body">
          <th mat-header-cell *matHeaderCellDef>Message</th>
          <td mat-cell *matCellDef="let a" class="truncate-cell">{{ a.body }}</td>
        </ng-container>

        <ng-container matColumnDef="date">
          <th mat-header-cell *matHeaderCellDef>Date</th>
          <td mat-cell *matCellDef="let a">{{ a.created_at | date: 'yyyy-MM-dd' }}</td>
        </ng-container>

        <ng-container matColumnDef="status">
          <th mat-header-cell *matHeaderCellDef>Statut</th>
          <td mat-cell *matCellDef="let a">
            <mat-chip class="type-chip type-sent">Envoyée</mat-chip>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
      </table>
    }
  </mat-card>
</div>
